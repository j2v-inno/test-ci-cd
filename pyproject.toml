[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
markers = [
    "integration: tests that hit a running app over HTTP",
    "smoke: minimal post-deploy checks",
]

[tool.bandit]
exclude_dirs = ["tests", ".venv"]
