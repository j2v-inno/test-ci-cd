# Stage 5 in the diagram: PR Validation Pipeline
# Runs on every pull request: compile, lint, static analysis, unit tests, security scan.
# Quality gates: Code review (GitHub UI), Build, Unit tests, Security scan.
name: PR Validation

on:
  pull_request:
    branches: [development, main]
  workflow_dispatch: {}

jobs:
  build:
    name: Compile & install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Byte-compile (smoke check)
        run: python -m compileall -q app tests

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.6.9
      - run: ruff check .
      - run: ruff format --check .

  static-analysis:
    name: Static analysis (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit==1.7.10
      - run: bandit -r app -ll

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/unit --cov=app --cov-report=term-missing

  security-scan:
    name: Dependency / security scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit==2.7.3
      # --strict makes pip-audit exit non-zero on any finding; relax with `|| true` if your demo trips on it
      - run: pip-audit -r requirements.txt --strict
