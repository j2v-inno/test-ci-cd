# Stage 12 in the diagram: Deploy to UAT / Staging.
# Manual trigger represents the QA-pass / pre-release sign-off.
# On real GitHub, gate this with a protected `staging` environment for approval.
name: Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      registry_url:
        description: "Registry used during build (must match)"
        required: false
        default: "localhost:5000"
      image_name:
        description: "Image name used during build (must match)"
        required: false
        default: "cicd-demo"
      image_tag:
        description: "Image tag to promote to staging"
        required: false
        default: "latest"
      app_port:
        description: "Host port the staging container binds to"
        required: false
        default: "8002"

jobs:
  deploy:
    name: Deploy staging stack
    runs-on: ubuntu-latest
    environment: staging   # GitHub UI shows an approval prompt; act ignores this
    env:
      REGISTRY: ${{ github.event.inputs.registry_url || 'localhost:5000' }}
      IMAGE_NAME: ${{ github.event.inputs.image_name || 'cicd-demo' }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
      APP_PORT: ${{ github.event.inputs.app_port || '8002' }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull image
        run: docker pull "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Down old staging stack
        run: docker compose -f docker-compose.staging.yml down || true

      - name: Up staging stack
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          APP_PORT: ${{ env.APP_PORT }}
        run: docker compose -f docker-compose.staging.yml up -d

      - name: Wait for healthy
        id: health_check
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' cicd-demo-staging 2>/dev/null || echo "starting")
            echo "Attempt $i: $status"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          docker logs cicd-demo-staging
          exit 1

      - name: Diagnose health check failure
        if: failure() && steps.health_check.outcome == 'failure'
        run: |
          echo "❌ STEP FAILED — Deploy health check"
          echo "   Workflow:     deploy-staging.yml"
          echo "   Mode:         build-and-push"
          echo "   Registry:     ${REGISTRY}"
          echo "   Image:        ${IMAGE_NAME}:${IMAGE_TAG}"
          echo "   Failed step:  Wait for healthy"
          echo ""
          echo "   Error output:"
          docker logs cicd-demo-staging 2>&1 || echo "(container not found)"
          docker ps -a 2>&1 || true
          echo ""
          echo "   Diagnosis:    Container did not pass health check within 30s"
          echo "   Likely cause: App crashed on start, wrong image tag, or port conflict"
          echo "   Fix:          Run docker logs cicd-demo-staging locally to inspect startup errors"

  business-validation:
    name: Business validation smoke
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Run smoke tests against staging
        id: smoke_test
        env:
          TARGET_URL: http://host.docker.internal:${{ github.event.inputs.app_port || '8002' }}
        run: pytest tests/smoke -m smoke -v
      - name: Diagnose smoke failure
        if: failure() && steps.smoke_test.outcome == 'failure'
        run: |
          echo "❌ STEP FAILED — Smoke tests"
          echo "   Workflow:     deploy-staging.yml"
          echo "   Target URL:   http://host.docker.internal:${{ github.event.inputs.app_port || '8002' }}"
          echo "   Failed step:  Run smoke tests against staging"
          echo ""
          echo "   Diagnosis:    Smoke tests failed against deployed staging stack"
          echo "   Likely cause: App not responding, health endpoint down, or test regression"
          echo "   Fix:          Check deploy logs and verify the staging stack is running"
