# Stage 10 + 11 in the diagram: QA Testing Stage and QA Approval Gate.
# Runs full integration + smoke suites against the deployed dev stack.
# A green run here is the technical pass; a human still approves stage 12.
name: QA Tests

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL of the env to test (match app_port from deploy-dev)"
        required: false
        default: "http://host.docker.internal:8001"
  workflow_run:
    workflows: ["Deploy to Dev"]
    types: [completed]
    branches: [main]

jobs:
  integration:
    name: Integration & API tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Integration tests
        id: integration_tests
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'http://host.docker.internal:8001' }}
        run: pytest tests/integration -m integration -v
      - name: Diagnose integration test failure
        if: failure() && steps.integration_tests.outcome == 'failure'
        run: |
          echo "❌ STEP FAILED — Integration tests"
          echo "   Workflow:     qa-tests.yml"
          echo "   Target URL:   ${{ github.event.inputs.target_url || 'http://host.docker.internal:8001' }}"
          echo "   Failed step:  Integration tests"
          echo ""
          echo "   Diagnosis:    Integration tests failed against the target environment"
          echo "   Likely cause: App not running at target URL, or API behavior regression"
          echo "   Fix:          Check deploy-dev logs, verify app is healthy, then re-run QA"

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: [integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Smoke tests
        id: smoke_tests
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'http://host.docker.internal:8001' }}
        run: pytest tests/smoke -m smoke -v
      - name: Diagnose smoke test failure
        if: failure() && steps.smoke_tests.outcome == 'failure'
        run: |
          echo "❌ STEP FAILED — Smoke tests"
          echo "   Workflow:     qa-tests.yml"
          echo "   Target URL:   ${{ github.event.inputs.target_url || 'http://host.docker.internal:8001' }}"
          echo "   Failed step:  Smoke tests"
          echo ""
          echo "   Diagnosis:    Smoke tests failed against the target environment"
          echo "   Likely cause: App not running at target URL, or health endpoint regression"
          echo "   Fix:          Check deploy-dev logs, verify app is healthy, then re-run QA"

  qa-gate:
    name: QA Approval Gate
    needs: [integration, smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Report QA pass
        run: |
          echo "[QA GATE] Integration + smoke suites passed."
          echo "Promotion to staging requires manual approval — run the 'Deploy to Staging' workflow."
