# Stage 9 in the diagram: Deploy to Dev Environment.
# Pulls the freshly built image and runs the dev stack via docker compose.
# Followed by a quick smoke check.
name: Deploy to Dev

on:
  workflow_dispatch:
    inputs:
      registry_url:
        description: "Registry used during build (must match)"
        required: false
        default: "localhost:5000"
      image_name:
        description: "Image name used during build (must match)"
        required: false
        default: "cicd-demo"
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: "latest"
      app_port:
        description: "Host port the dev container binds to"
        required: false
        default: "8001"
  workflow_run:
    workflows: ["Main Build & Package"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy dev stack
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      REGISTRY: ${{ github.event.inputs.registry_url || 'localhost:5000' }}
      IMAGE_NAME: ${{ github.event.inputs.image_name || 'cicd-demo' }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
      APP_PORT: ${{ github.event.inputs.app_port || '8001' }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull image
        run: docker pull "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Bring down old dev stack (if any)
        run: docker compose -f docker-compose.dev.yml down || true

      - name: Bring up dev stack
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          APP_PORT: ${{ env.APP_PORT }}
        run: docker compose -f docker-compose.dev.yml up -d

      - name: Wait for healthy
        id: health_check
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' cicd-demo-dev 2>/dev/null || echo "starting")
            echo "Attempt $i: $status"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          docker logs cicd-demo-dev
          exit 1

      - name: Diagnose health check failure
        if: failure() && steps.health_check.outcome == 'failure'
        run: |
          echo "❌ STEP FAILED — Deploy health check"
          echo "   Workflow:     deploy-dev.yml"
          echo "   Mode:         build-and-push"
          echo "   Registry:     ${REGISTRY}"
          echo "   Image:        ${IMAGE_NAME}:${IMAGE_TAG}"
          echo "   Failed step:  Wait for healthy"
          echo ""
          echo "   Error output:"
          docker logs cicd-demo-dev 2>&1 || echo "(container not found)"
          docker ps -a 2>&1 || true
          echo ""
          echo "   Diagnosis:    Container did not pass health check within 30s"
          echo "   Likely cause: App crashed on start, wrong image tag, or port conflict"
          echo "   Fix:          Run docker logs cicd-demo-dev locally to inspect startup errors"

  smoke:
    name: Post-deploy smoke (dev)
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Run smoke tests against dev
        id: smoke_test
        env:
          # host.docker.internal lets the act container reach the dev stack on the host
          TARGET_URL: http://host.docker.internal:${{ github.event.inputs.app_port || '8001' }}
        run: pytest tests/smoke -m smoke
      - name: Diagnose smoke failure
        if: failure() && steps.smoke_test.outcome == 'failure'
        run: |
          echo "❌ STEP FAILED — Smoke tests"
          echo "   Workflow:     deploy-dev.yml"
          echo "   Target URL:   http://host.docker.internal:${{ github.event.inputs.app_port || '8001' }}"
          echo "   Failed step:  Run smoke tests against dev"
          echo ""
          echo "   Diagnosis:    Smoke tests failed against deployed dev stack"
          echo "   Likely cause: App not responding, health endpoint down, or test regression"
          echo "   Fix:          Check deploy logs and verify the dev stack is running"
